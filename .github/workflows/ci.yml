name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # Auch bei Version-Tags auslösen
  pull_request:
    branches: [ main ]

# Globale Permissions: so wenig wie möglich
permissions:
  contents: read

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Tests mit Coverage
        run: npm run test:ci

      - name: Coverage-Report speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Zusammenfassung bei Fehler
        if: failure()
        run: |
          echo "## Pipeline fehlgeschlagen!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ausgelöst von:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Zusammenfassung bei Erfolg
        if: success()
        run: |
          echo "## Pipeline erfolgreich!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ✅ |" >> $GITHUB_STEP_SUMMARY

      - name: Sicherheits-Scan (npm audit)
        run: npm audit --audit-level=high
        # Schlägt fehl bei HIGH oder CRITICAL Schwachstellen
        # Für weniger strenge Prüfung: --audit-level=critical

      - name: API aufrufen (Beispiel)
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
        run: |
          # Secret ist als Umgebungsvariable verfügbar
          # GitHub maskiert den Wert automatisch in Logs
          echo "Key ist gesetzt: ${{ secrets.MY_API_KEY != '' }}"

  # ── Job 2: Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test      # Erst bauen wenn Tests grün

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Produktion-Build erstellen
        run: npm run build

      - name: Build-Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 30

  # ── Job 3: Deploy (nur auf main und bei Tags) ──────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # Nur dieser Job braucht Schreib-Rechte
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Auf GitHub Pages deployen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "deploy: ${{ github.sha }}"

  # ── Job 4: GitHub Release (nur bei Tags) ───────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    # Für Release erstellen
    permissions:
      contents: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Release-Archiv erstellen
        run: zip -r release-${{ github.ref_name }}.zip dist/

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: release-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Release ${{ github.ref_name }}

            Automatisch deployed via GitHub Actions.

            ### Änderungen
            Siehe automatisch generierte Release Notes unten.
  deploy-production:
    name: Deploy to Production (with Approval)
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production    # <- Wartet auf manuellen Approval!

    steps:
      - run: echo "Production deployment approved and running!"
      # Hier echte Deployment-Steps einfügen  